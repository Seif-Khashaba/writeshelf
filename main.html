<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WriteShelf</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* Layout */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f9f9f9;
            color: #333;
        }

        header {
            width: 100%;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #444;
            color: #fff;
        }

        .user-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            cursor: pointer;
            position: relative;
        }

        /* Grid Container */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem;
            padding: 2rem;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem;
            padding: 2rem;
        }

        .book-card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            aspect-ratio: 2/3;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }

        .book-cover {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .book-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 1rem 1rem;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8) 20%, rgba(0, 0, 0, 0.95));
            color: white;
        }

        .book-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 0 0.3rem 0;
            line-height: 1.3;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .book-author {
            font-size: 0.9rem;
            opacity: 0.9;
            margin: 0 0 0.5rem 0;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .book-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .stars {
            color: #ffd700;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .rating-value {
            opacity: 0.9;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .search-input {
            width: 100%;
            padding: 12px 24px;
            border-radius: 30px;
            border: 2px solid #e0e0e0;
            background-color: white;
            color: #333;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .search-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 2px 12px rgba(99, 102, 241, 0.15);
        }

        .search-input::placeholder {
            color: #999;
        }

        .no-results {
            text-align: center;
            padding: 2rem;
            color: #666;
            font-size: 1.1rem;
            grid-column: 1 / -1;
        }

        /* Notification Badge */
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-icon {
            color: white;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .dropdown-menu {
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

<header>
    <h1>WriteShelf</h1>
    <div class="user-icon" onclick="toggleDropdown()">
        <i class="bi bi-person-fill"></i>
        <div class="dropdown-menu" id="dropdownMenu">
            <a href="/profile">Profile</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>
</header>

<div class="search-container">
    <input type="text" class="search-input" placeholder="Search by title, author, or anything..." id="searchInput">
</div>

<div class="grid-container" id="bookGrid">
    <!-- Books will be added here dynamically -->
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Search functionality
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', handleSearch);

    function handleSearch() {
        const searchTerm = searchInput.value.toLowerCase();
        const books = window.allBooks || [];
        
        const filteredBooks = searchTerm 
            ? books.filter(book => 
                book.title.toLowerCase().includes(searchTerm) || 
                book.author.toLowerCase().includes(searchTerm)
            )
            : books;
            
        displayBooks(filteredBooks);
    }

    function displayBooks(books) {
        const bookGrid = document.getElementById('bookGrid');
        
        if (!books || books.length === 0) {
            bookGrid.innerHTML = '<div class="no-results">No books found matching your search</div>';
            return;
        }
        
        bookGrid.innerHTML = books.map(book => `
            <div class="book-card" onclick="window.location.href='/book?id=${book._id}'">
                <div class="book-cover">
                    <img src="${book.cover_image}" alt="${book.title}" onerror="this.src='https://picsum.photos/400/600'">
                </div>
                <div class="book-info">
                    <h3 class="book-title">${book.title}</h3>
                    <p class="book-author">by ${book.author}</p>
                    <div class="book-rating">
                        <span class="stars">${'★'.repeat(Math.floor(book.rating))}${'☆'.repeat(5 - Math.floor(book.rating))}</span>
                        <span class="rating-value">${book.rating.toFixed(1)}</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // Load and display books
    async function loadBooks() {
        try {
            const response = await fetch('/api/books');
            if (!response.ok) {
                throw new Error('Failed to fetch books');
            }
            const books = await response.json();
            // Store books globally for search functionality
            window.allBooks = books;
            displayBooks(books);
        } catch (error) {
            console.error('Error loading books:', error);
            document.getElementById('bookGrid').innerHTML = `
                <div class="alert alert-danger">
                    Failed to load books. Please try again later.
                </div>
            `;
        }
    }

    // Initial load
    document.addEventListener('DOMContentLoaded', () => {
        loadBooks();
    });

    async function logout() {
        try {
            const response = await fetch('/api/logout');
            const data = await response.json();
            if (data.success) {
                window.location.href = data.redirect;
            }
        } catch (error) {
            console.error('Logout error:', error);
        }
    }
</script>

</body>
</html>
